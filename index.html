<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日接龙统计 (云同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage: { 50: '#f4f5f0', 100: '#e8ebe3', 200: '#d5dacc', 300: '#b8c2a8', 400: '#9aa886', 500: '#7d8f6b', 600: '#627254', 700: '#4e5a43', 800: '#404a38', 900: '#363f30' },
                        cream: '#faf9f6', 'stone-custom': '#8c8c7a'
                    },
                    fontFamily: { serif: ['"Noto Serif SC"', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f4f5f0; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .tab-active { background-color: #627254; color: white; box-shadow: 0 4px 14px rgba(98, 114, 84, 0.3); }
        .tab-inactive { background-color: transparent; color: #8c8c7a; border: 1px solid #d5dacc; }
        .input-area { background: linear-gradient(180deg, #faf9f6 0%, #f4f5f0 100%); border: 1px solid #d5dacc; }
        .btn-primary { background: linear-gradient(135deg, #9aa886 0%, #7d8f6b 100%); transition: all 0.3s ease; }
        .stat-card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(213, 218, 204, 0.6); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen text-gray-700">

    <header class="sticky top-0 z-50 glass-panel border-b border-sage-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-baseline gap-3">
                <h1 class="text-2xl font-serif-sc font-bold text-gray-800">每日接龙统计</h1>
                <span id="sync-status" class="text-xs text-amber-600 font-medium italic">正在同步云端...</span>
            </div>
            <div class="text-xs text-stone-custom tracking-widest uppercase hidden sm:block">Cloud Sync Enabled</div>
        </div>
    </header>

    <nav class="max-w-7xl mx-auto px-6 mt-6 mb-8">
        <div class="inline-flex bg-white/60 backdrop-blur-sm rounded-xl p-1.5 border border-sage-200 shadow-sm">
            <button onclick="switchTab('analysis')" id="tab-analysis" class="tab-active px-6 py-2.5 rounded-lg text-sm font-medium">数据分析</button>
            <button onclick="switchTab('personnel')" id="tab-personnel" class="tab-inactive px-6 py-2.5 rounded-lg text-sm font-medium ml-2">人员汇总</button>
            <button onclick="switchTab('history')" id="tab-history" class="tab-inactive px-6 py-2.5 rounded-lg text-sm font-medium ml-2">历史日志</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-12">
        <div id="view-analysis" class="animate-fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-sage-100">
                        <textarea id="input-data" placeholder="在此粘贴接龙文字..." class="w-full h-64 input-area rounded-xl p-4 text-sm font-mono mb-4 focus:ring-0 outline-none"></textarea>
                        <button onclick="parseData()" class="btn-primary w-full py-3.5 rounded-xl text-white font-medium shadow-lg">解析并同步到云端</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="stat-card rounded-2xl p-5 text-center">
                            <div class="text-xs text-gray-500 mb-2 uppercase">全员累计总数</div>
                            <div id="today-total" class="text-3xl font-bold text-sage-800">0</div>
                        </div>
                        <div class="stat-card rounded-2xl p-5 text-center">
                            <div class="text-xs text-gray-500 mb-2 uppercase">总参与人数</div>
                            <div id="today-count" class="text-3xl font-bold text-sage-800">0</div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-8">
                    <div class="bg-white rounded-2xl shadow-sm border border-sage-100 min-h-[500px]">
                        <div id="personnel-list" class="p-6">
                            <p class="text-center text-gray-400 py-20 italic">正在从云端调取档案...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-personnel" class="hidden animate-fade-in">
            <div id="personnel-detail-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>

        <div id="view-history" class="hidden animate-fade-in">
            <div id="history-list" class="space-y-4 bg-white p-8 rounded-2xl border"></div>
        </div>
    </main>

    <script>
        // --- 核心配置区 ---
        const SUPABASE_URL = 'https://cfbyqoralwvjckgnqfyo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hq6Z9NJnLXtsY0hyMEZqWA_eboKn5yE'; 
        const RECORD_ID = '00000000-0000-0000-0000-000000000000';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let globalData = { personnel: {}, dailyRecords: [] };

        // 初始化加载
        document.addEventListener('DOMContentLoaded', loadFromCloud);

        async function loadFromCloud() {
            updateStatus('正在同步云端...');
            try {
                const { data, error } = await _supabase
                    .from('jielong_records')
                    .select('data')
                    .eq('id', RECORD_ID)
                    .single();
                
                if (data && data.data && data.data.personnel) {
                    globalData = data.data;
                    updateStatus('云端已同步', 'text-sage-600');
                } else {
                    updateStatus('云端为空，请录入数据', 'text-gray-400');
                }
            } catch (e) {
                updateStatus('同步失败，请检查网络', 'text-red-500');
            }
            updateUI();
        }

        async function saveToCloud() {
            updateStatus('正在上传...');
            const { error } = await _supabase
                .from('jielong_records')
                .update({ data: globalData, updated_at: new Date() })
                .eq('id', RECORD_ID);
            
            if (error) updateStatus('上传失败', 'text-red-500');
            else updateStatus('云端已更新', 'text-sage-600');
        }

        function updateStatus(msg, colorClass = 'text-amber-600') {
            const el = document.getElementById('sync-status');
            el.innerText = msg;
            el.className = `text-xs font-medium italic ${colorClass}`;
        }

        // --- 逻辑函数 ---
        function parseData() {
            const input = document.getElementById('input-data').value.trim();
            if (!input) return;

            const lines = input.split('\n');
            const parsed = [];
            const namePattern = /^\d+[\.\、]\s*([^\d\s【\[\(]+)\s*[:：]?\s*(\d+(?:\.\d+)?)/;

            lines.forEach(line => {
                const match = line.match(namePattern);
                if (match) {
                    const name = match[1].trim();
                    const amount = parseFloat(match[2]);
                    parsed.push({ name, amount });
                }
            });

            if (parsed.length === 0) { alert('未识别出有效格式'); return; }

            parsed.forEach(({ name, amount }) => {
                if (!globalData.personnel[name]) globalData.personnel[name] = { count: 0, total: 0 };
                globalData.personnel[name].count++;
                globalData.personnel[name].total += amount;
            });

            globalData.dailyRecords.unshift({ date: new Date().toLocaleDateString(), count: parsed.length, details: parsed });
            
            document.getElementById('input-data').value = '';
            updateUI();
            saveToCloud();
        }

        function updateUI() {
            const container = document.getElementById('personnel-list');
            const sorted = Object.entries(globalData.personnel).sort((a, b) => b[1].total - a[1].total);
            
            if (sorted.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-20 italic">暂无数据</p>`;
                return;
            }

            container.innerHTML = `
                <div class="grid grid-cols-12 gap-4 px-4 py-2 bg-sage-50 text-xs font-bold uppercase mb-2">
                    <div class="col-span-1">#</div><div class="col-span-5">姓名</div><div class="col-span-2 text-center">次数</div><div class="col-span-4 text-right">累计</div>
                </div>
                ${sorted.map(([name, data], idx) => `
                <div class="grid grid-cols-12 gap-4 px-4 py-3 border-b border-gray-50 items-center text-sm">
                    <div class="col-span-1 text-gray-400">${idx+1}</div>
                    <div class="col-span-5 font-semibold text-gray-800">${name}</div>
                    <div class="col-span-2 text-center">${data.count}</div>
                    <div class="col-span-4 text-right font-bold text-sage-700">${data.total.toLocaleString()}</div>
                </div>`).join('')}`;

            document.getElementById('today-total').textContent = Object.values(globalData.personnel).reduce((s, p) => s + p.total, 0).toLocaleString();
            document.getElementById('today-count').textContent = Object.keys(globalData.personnel).length;
        }

        function switchTab(tab) {
            ['analysis', 'personnel', 'history'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = 'tab-inactive px-6 py-2.5 rounded-lg text-sm font-medium ml-2';
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = 'tab-active px-6 py-2.5 rounded-lg text-sm font-medium';
            
            if (tab === 'history') {
                document.getElementById('history-list').innerHTML = globalData.dailyRecords.map(r => `
                    <div class="p-4 bg-sage-50 rounded-xl mb-2">
                        <div class="font-bold">${r.date}</div>
                        <div class="text-xs text-gray-500">${r.details.map(d => `${d.name}(${d.amount})`).join(', ')}</div>
                    </div>
                `).join('') || '暂无历史';
            }
        }
    </script>
</body>
</html>
